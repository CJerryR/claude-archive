name: ✨ 功能建议
description: 提出一个新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / 痛点
      placeholder: "我在……时遇到……，希望能……"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的其他方案（可选）
  - type: textarea
    id: extra
    attributes:
      label: 补充说明 / 参考（可选）
