<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude 存档 · 历史文件整理报告</title>
<style>
  :root{
    --bg:#1f1e1d; --bg2:#1a1917; --elev:#2a2826; --text:#faf9f5; --t2:#c2bfb6; --t3:#8b877e;
    --border:#3a3833; --accent:#d97757; --accent-soft:#3a2a23; --code:#1a1917;
    --green:#3a9d5c; --yellow:#d9b65a; --red:#d97766;
    --sans:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    --mono:"Cascadia Code",Consolas,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 22px 80px}
  h1{font-size:22px;font-weight:650;margin:0 0 6px}
  .sub{color:var(--t3);font-size:13px;margin-bottom:22px}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
  button,.btn{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--border);
    color:var(--text);font-family:var(--sans);font-size:13.5px;font-weight:500;padding:9px 14px;border-radius:9px;cursor:pointer;transition:.14s}
  button:hover,.btn:hover{background:var(--elev);border-color:#4a4843}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{filter:brightness(1.08)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button svg{width:16px;height:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:18px 0}
  .cell{background:var(--elev);border:1px solid var(--border);border-radius:11px;padding:12px 14px}
  .cell .n{font-size:22px;font-weight:700;color:var(--accent);line-height:1.1}
  .cell .k{font-size:11.5px;color:var(--t2);margin-top:4px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--t3);margin:6px 0 18px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .conv{background:var(--bg2);border:1px solid var(--border);border-radius:13px;margin-bottom:14px;overflow:hidden}
  .conv>summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:10px}
  .conv>summary::-webkit-details-marker{display:none}
  .conv>summary:hover{background:var(--elev)}
  .conv .cname{font-weight:600;font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .cmeta{font-size:12px;color:var(--t3);font-family:var(--mono)}
  .conv .chev{color:var(--t3);transition:.2s}
  .conv[open] .chev{transform:rotate(90deg)}
  .group{padding:4px 16px 14px}
  .gtitle{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--t3);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px}
  td.fn{font-family:var(--mono);font-size:12.5px;word-break:break-all}
  td.sz{font-family:var(--mono);color:var(--t2);white-space:nowrap}
  .tag{display:inline-block;font-size:10.5px;font-family:var(--mono);padding:1px 7px;border-radius:5px;white-space:nowrap}
  .tag.flat{background:#3a2a23;color:#e3a07f}
  .tag.convcode{background:#23323a;color:#7fb0c8}
  .tag.round{background:#243a2a;color:#7fc89a}
  .tag.history{background:#33302a;color:#cbb97f}
  .tag.dup{background:#3a2323;color:#d99}
  .dupbox{background:var(--code);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:6px}
  .dup-item{font-family:var(--mono);font-size:12px;color:var(--t2);padding:3px 0}
  .empty{color:var(--t3);text-align:center;padding:50px 0}
  .prog{font-size:13px;color:var(--t2);margin-left:6px}
  footer{margin-top:26px;color:var(--t3);font-size:12px}
  code{font-family:var(--mono);background:var(--code);padding:1px 5px;border-radius:4px;font-size:.9em}
</style>
</head>
<body>
<div class="wrap">
  <h1>历史文件整理报告</h1>
  <div class="sub">选中下载目录里的 <code>ClaudeArchive</code> 文件夹,本工具只读扫描,按对话 + 版本/轮次归类,并标出内容重复的文件。<b>不会修改或删除任何文件。</b></div>

  <div class="bar">
    <button class="primary" id="pick">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke-linejoin="round"/></svg>
      选择 ClaudeArchive 文件夹
    </button>
    <button id="expandAll" disabled>全部展开</button>
    <button id="collapseAll" disabled>全部折叠</button>
    <button id="exportJson" disabled>导出 JSON 清单</button>
    <button id="exportCsv" disabled>导出 CSV 清单</button>
    <span class="prog" id="prog"></span>
    <input type="file" id="folder" webkitdirectory directory multiple hidden>
  </div>

  <div id="summary"></div>
  <div id="report"><div class="empty">尚未扫描。点上方按钮选择 ClaudeArchive 文件夹开始。</div></div>

  <footer>纯本地运行,不上传任何数据。布局识别:<span class="tag flat">平铺</span> = 老版本(files 直接放);
  <span class="tag convcode">对话码</span> = files/{对话uuid前8};
  <span class="tag round">轮次</span> = files/r{序号}_{时分秒}_{uuid8};
  <span class="tag history">快照</span> = history/。</footer>
</div>

<script>
'use strict';
const $=(s,r=document)=>r.querySelector(s);
let MODEL=null; // 扫描结果

const fmtSize=b=>{ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(2)+' MB'; };
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function classify(rel){
  const parts=rel.split('/');
  const fi=parts.indexOf('files');
  if(fi<0){
    if(parts.includes('history')) return {layout:'history', sub:null};
    const base=parts[parts.length-1];
    if(base==='conversation.json'||base==='conversation.md') return {layout:'canonical', sub:null};
    return {layout:'other', sub:null};
  }
  const after=parts.slice(fi+1);
  if(after.length===1) return {layout:'flat', sub:null};
  const sub=after[0];
  if(/^r\d+_\d+_[0-9a-zA-Z]+$/.test(sub)) return {layout:'round', sub};
  if(/^[0-9a-f]{8}$/i.test(sub)) return {layout:'convcode', sub};
  return {layout:'subdir', sub};
}
// 对话目录名:取 ClaudeArchive 之后第一段 {name}__{uuid8}
function convDirOf(rel){
  const parts=rel.split('/');
  const ai=parts.indexOf('ClaudeArchive');
  const start = ai>=0 ? ai+1 : 0;
  return parts[start] || '(根)';
}
async function sha256(file){
  try{
    const buf=await file.arrayBuffer();
    const h=await crypto.subtle.digest('SHA-256', buf);
    return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ return 'size:'+file.size; } // 退化:用大小当弱指纹
}

async function scan(fileList){
  const files=[...fileList].filter(f=>{
    const rel=f.webkitRelativePath||f.name;
    // 只看 files/ 下的产出 + history 快照(canonical 也记一下)
    return /\/files\//.test(rel) || /\/history\//.test(rel) || /\/conversation\.(json|md)$/.test(rel);
  });
  if(!files.length){ return null; }

  const convs=new Map(); // convDir -> { files:[], byLayout:{} }
  const hashGroups=new Map(); // hash -> [ {conv, rel, name} ]
  let done=0;
  for(const f of files){
    const rel=f.webkitRelativePath||f.name;
    const cls=classify(rel);
    const conv=convDirOf(rel);
    const name=rel.split('/').pop();
    if(!convs.has(conv)) convs.set(conv,{files:[],byLayout:{}});
    const rec={ rel, name, size:f.size, layout:cls.layout, sub:cls.sub, hash:null };
    convs.get(conv).files.push(rec);

    // 只对产出文件做去重指纹(快照/canonical 不算重复)
    if(cls.layout==='flat'||cls.layout==='convcode'||cls.layout==='round'||cls.layout==='subdir'){
      const h=await sha256(f); rec.hash=h;
      if(!hashGroups.has(h)) hashGroups.set(h,[]);
      hashGroups.get(h).push({conv, rel, name});
    }
    done++; if(done%15===0){ $('#prog').textContent=`扫描中… ${done}/${files.length}`; await new Promise(r=>setTimeout(r,0)); }
  }
  // 标记重复
  const dups=[];
  for(const [h,arr] of hashGroups){ if(arr.length>1) dups.push({hash:h, items:arr}); }
  // 每个 conv 内统计布局
  for(const [,c] of convs){
    for(const f of c.files){ c.byLayout[f.layout]=(c.byLayout[f.layout]||0)+1; }
  }
  $('#prog').textContent='';
  return {convs, dups, total:files.length};
}

function renderSummary(M){
  const convCount=M.convs.size;
  let flat=0,convcode=0,round=0,hist=0,canon=0,other=0,produced=0;
  for(const [,c] of M.convs){ for(const f of c.files){
    if(f.layout==='flat')flat++; else if(f.layout==='convcode')convcode++; else if(f.layout==='round')round++;
    else if(f.layout==='history')hist++; else if(f.layout==='canonical')canon++; else other++;
    if(['flat','convcode','round','subdir'].includes(f.layout))produced++;
  }}
  const dupFiles=M.dups.reduce((s,d)=>s+d.items.length,0);
  $('#summary').innerHTML=`
    <div class="stat-grid">
      <div class="cell"><div class="n">${convCount}</div><div class="k">个对话存档</div></div>
      <div class="cell"><div class="n">${produced}</div><div class="k">产出文件(图片/文档/包)</div></div>
      <div class="cell"><div class="n">${M.dups.length}</div><div class="k">组内容重复</div></div>
      <div class="cell"><div class="n">${dupFiles}</div><div class="k">重复文件数</div></div>
      <div class="cell"><div class="n">${hist}</div><div class="k">历史快照</div></div>
    </div>
    <div class="legend">
      <span><i style="background:#e3a07f"></i>平铺 ${flat}</span>
      <span><i style="background:#7fb0c8"></i>对话码子目录 ${convcode}</span>
      <span><i style="background:#7fc89a"></i>轮次子目录 ${round}</span>
      <span><i style="background:#cbb97f"></i>历史快照 ${hist}</span>
      <span style="color:var(--t3)">canonical ${canon}</span>
    </div>`;
}

function renderReport(M){
  // 建一个 "文件rel -> 是否重复" 映射
  const dupRel=new Set();
  for(const d of M.dups){ for(const it of d.items) dupRel.add(it.rel); }

  const convs=[...M.convs.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  let html='';
  for(const [conv,c] of convs){
    // 按"产出文件名"再分组,展示同名不同版本/布局
    const produced=c.files.filter(f=>['flat','convcode','round','subdir'].includes(f.layout));
    const byName=new Map();
    for(const f of produced){ if(!byName.has(f.name))byName.set(f.name,[]); byName.get(f.name).push(f); }
    const layoutTags=Object.entries(c.byLayout).filter(([k])=>k!=='canonical').map(([k,n])=>{
      const map={flat:'平铺',convcode:'对话码',round:'轮次',history:'快照',subdir:'子目录',other:'其他'};
      return `<span class="tag ${k}">${map[k]||k} ${n}</span>`;
    }).join(' ');

    let rows='';
    for(const [name,arr] of [...byName.entries()].sort((a,b)=>a[0].localeCompare(b[0]))){
      arr.sort((x,y)=>(x.sub||'').localeCompare(y.sub||''));
      for(const f of arr){
        const where = f.sub ? f.sub : '(files 根)';
        const isDup = dupRel.has(f.rel);
        rows+=`<tr>
          <td class="fn">${esc(name)}${arr.length>1?` <span class="tag" style="background:var(--accent-soft);color:var(--accent)">${arr.length}版</span>`:''}</td>
          <td><span class="tag ${f.layout}">${({flat:'平铺',convcode:'对话码',round:'轮次',subdir:'子目录'})[f.layout]||f.layout}</span></td>
          <td class="fn" style="color:var(--t3)">${esc(where)}</td>
          <td class="sz">${fmtSize(f.size)}</td>
          <td>${isDup?'<span class="tag dup">内容重复</span>':''}</td>
        </tr>`;
      }
    }
    const histCount=c.byLayout.history||0;
    html+=`<details class="conv">
      <summary>
        <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="cname">${esc(conv)}</span>
        ${layoutTags}
        <span class="cmeta">${produced.length} 文件</span>
      </summary>
      <div class="group">
        ${rows?`<table><thead><tr><th>文件名</th><th>布局</th><th>所在子目录</th><th>大小</th><th>重复</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty" style="padding:18px">该对话目录下没有产出文件。</div>'}
        ${histCount?`<div class="gtitle">历史快照</div><div style="color:var(--t3);font-size:12.5px">history/ 下有 ${histCount} 份带时间戳的 JSON 快照(可用查看器自动合并)。</div>`:''}
      </div>
    </details>`;
  }

  // 重复清单总览
  if(M.dups.length){
    let dl='';
    for(const d of M.dups.slice(0,200)){
      dl+=`<div class="dup-item">• ${d.items.map(i=>esc(i.conv+'/…/'+i.name)).join('  =  ')}</div>`;
    }
    html+=`<div class="gtitle" style="margin-top:22px">内容完全相同的重复文件(${M.dups.length} 组)</div>
      <div class="dupbox">${dl}${M.dups.length>200?'<div class="dup-item">… 仅显示前 200 组</div>':''}</div>`;
  }
  $('#report').innerHTML=html||'<div class="empty">没有发现产出文件。</div>';
}

async function run(fileList){
  $('#report').innerHTML='<div class="empty">扫描中,正在计算文件指纹…</div>';
  const M=await scan(fileList);
  if(!M){ $('#report').innerHTML='<div class="empty">没找到 ClaudeArchive 结构(需要含 files/ 或 history/ 的对话目录)。</div>'; return; }
  MODEL=M;
  renderSummary(M);
  renderReport(M);
  for(const id of ['expandAll','collapseAll','exportJson','exportCsv']) $('#'+id).disabled=false;
}

function exportJson(){
  if(!MODEL) return;
  const out={ generated_at:new Date().toISOString(), conversations:[] };
  for(const [conv,c] of MODEL.convs){
    out.conversations.push({ conversation:conv, byLayout:c.byLayout,
      files:c.files.map(f=>({name:f.name, layout:f.layout, subdir:f.sub, size:f.size, path:f.rel, sha256:f.hash})) });
  }
  out.duplicates=MODEL.dups.map(d=>({sha256:d.hash, files:d.items.map(i=>i.rel)}));
  dl(JSON.stringify(out,null,2),'整理清单.json','application/json');
}
function exportCsv(){
  if(!MODEL) return;
  const rows=[['对话','文件名','布局','子目录','大小(字节)','是否重复','相对路径','sha256']];
  const dupRel=new Set(); for(const d of MODEL.dups) for(const it of d.items) dupRel.add(it.rel);
  for(const [conv,c] of MODEL.convs){
    for(const f of c.files){
      rows.push([conv,f.name,f.layout,f.sub||'',f.size, dupRel.has(f.rel)?'是':'', f.rel, f.hash||'']);
    }
  }
  const csv='\uFEFF'+rows.map(r=>r.map(x=>{ const s=String(x==null?'':x); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')).join('\n');
  dl(csv,'整理清单.csv','text/csv');
}
function dl(text,name,type){
  const u=URL.createObjectURL(new Blob([text],{type:type+';charset=utf-8'}));
  const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(u),2000);
}

$('#pick').addEventListener('click',()=>$('#folder').click());
$('#folder').addEventListener('change',e=>run(e.target.files));
$('#expandAll').addEventListener('click',()=>document.querySelectorAll('.conv').forEach(d=>d.open=true));
$('#collapseAll').addEventListener('click',()=>document.querySelectorAll('.conv').forEach(d=>d.open=false));
$('#exportJson').addEventListener('click',exportJson);
$('#exportCsv').addEventListener('click',exportCsv);
</script>
</body>
</html>
