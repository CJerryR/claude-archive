<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude · 本地存档查看器</title>
<style>
  :root[data-theme="dark"]{
    --bg:#262624; --bg-side:#1f1e1d; --bg-elev:#30302d; --bg-user:#34322f;
    --text:#f1efe7; --text-2:#b8b4aa; --text-3:#86827a; --text-faint:#615e57;
    --border:#393833; --border-soft:#2f2e2a; --accent:#d97757; --accent-soft:#3a2a23;
    --code-bg:#1b1b19; --detail-bg:#2b2a27; --active:#34322e; --hover:#2c2b28;
    --scroll:#46443e;
  }
  :root[data-theme="light"]{
    --bg:#ffffff; --bg-side:#f5f4ee; --bg-elev:#f0efe8; --bg-user:#f3f1e9;
    --text:#2b2925; --text-2:#69655d; --text-3:#94908857; --text-3:#928e86; --text-faint:#b3afa6;
    --border:#e7e4db; --border-soft:#eeece4; --accent:#c4623d; --accent-soft:#f5e7df;
    --code-bg:#f4f3ec; --detail-bg:#f6f5ef; --active:#eae8df; --hover:#efeee7;
    --scroll:#d8d5cc;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);background:var(--bg);color:var(--text);
    font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;
    --sans:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
    --serif:"Tiempos Text",Georgia,"Songti SC","Noto Serif CJK SC","Source Han Serif SC","Times New Roman",serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,"Cascadia Code","Courier New",monospace;
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:6px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}

  .app{display:flex;height:100vh}

  /* ---------- 侧栏 ---------- */
  .sidebar{
    width:272px;flex:none;background:var(--bg-side);border-right:1px solid var(--border-soft);
    display:flex;flex-direction:column;height:100vh;
  }
  .brand{
    display:flex;align-items:center;gap:8px;padding:18px 18px 10px;
  }
  .brand .logo{font-family:var(--serif);font-size:23px;font-weight:500;letter-spacing:.2px;color:var(--text)}
  .brand .sp{margin-left:auto;display:flex;gap:6px;color:var(--text-3)}
  .brand .ic{width:30px;height:30px;display:grid;place-items:center;border-radius:7px;cursor:pointer}
  .brand .ic:hover{background:var(--hover);color:var(--text)}
  .brand .ic svg{width:18px;height:18px}

  .side-pad{padding:6px 12px}
  .load-btn{
    display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:9px;
    background:transparent;border:1px solid var(--border);color:var(--text);cursor:pointer;
    font-family:var(--sans);font-size:14px;font-weight:500;transition:background .14s,border-color .14s;
  }
  .load-btn:hover{background:var(--hover)}
  .load-btn svg{width:17px;height:17px;flex:none;color:var(--accent)}
  .load-btn-sub{margin-top:6px;padding:7px 11px;font-size:12.5px;color:var(--text-2)}
  .load-btn-sub svg{width:15px;height:15px}

  .search{padding:8px 12px 4px;position:relative}
  .search svg{position:absolute;left:22px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-3)}
  .search input{
    width:100%;padding:8px 10px 8px 32px;border-radius:8px;border:1px solid transparent;
    background:var(--bg-elev);color:var(--text);font-family:var(--sans);font-size:13.5px;outline:none;
  }
  .search input:focus{border-color:var(--border)}
  .search input::placeholder{color:var(--text-3)}

  .convlist{flex:1;overflow-y:auto;padding:6px 8px 16px}
  .side-group{margin-top:10px}
  .side-group-t{
    font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.4px;
    padding:6px 10px 4px;text-transform:none;
  }
  .conv-item{
    display:block;width:100%;text-align:left;padding:7px 10px;border-radius:8px;border:0;
    background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--sans);font-size:13.5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s,color .12s;
  }
  .conv-item:hover{background:var(--hover);color:var(--text)}
  .conv-item.active{background:var(--active);color:var(--text);font-weight:500}
  .side-empty{padding:24px 14px;color:var(--text-3);font-size:13px;text-align:center;line-height:1.7}

  .side-foot{
    padding:10px 16px;border-top:1px solid var(--border-soft);
    font-size:11.5px;color:var(--text-3);display:flex;align-items:center;gap:8px;
  }
  .side-foot .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}

  /* ---------- 主区 ---------- */
  .main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;background:var(--bg)}
  .topbar{
    height:56px;flex:none;display:flex;align-items:center;gap:10px;padding:0 20px;
    border-bottom:1px solid var(--border-soft);
  }
  .top-title{
    font-family:var(--serif);font-size:16px;font-weight:500;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;
  }
  .top-model{
    font-family:var(--mono);font-size:11px;color:var(--text-3);background:var(--bg-elev);
    padding:3px 8px;border-radius:6px;
  }
  .top-merged{
    font-family:var(--sans);font-size:11px;color:var(--accent);background:var(--accent-soft);
    padding:3px 9px;border-radius:6px;font-weight:600;
  }
  .top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
  .top-btn{
    display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;
    border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;
    font-family:var(--sans);font-size:13px;transition:background .14s,color .14s}
  .top-btn:hover{background:var(--hover);color:var(--text)}
  .top-btn svg{width:15px;height:15px}

  .thread{flex:1;overflow-y:auto;padding:8px 0 80px}
  .thread-inner{max-width:744px;margin:0 auto;padding:18px 28px}

  /* ---------- 消息 ---------- */
  .msg{margin:6px 0 26px}
  .msg-inner{}
  .msg.human .msg-inner{
    background:var(--bg-user);border-radius:14px;padding:13px 17px;
    font-family:var(--sans);font-size:15px;color:var(--text);width:fit-content;max-width:100%;margin-left:auto;
  }
  .msg.assistant .msg-inner{padding:2px 0}
  .msg.assistant .md{font-family:var(--serif);font-size:16px;line-height:1.72;color:var(--text)}

  .md>*:first-child{margin-top:0}
  .md>*:last-child{margin-bottom:0}
  .md p{margin:0 0 14px}
  .md h1,.md h2,.md h3,.md h4{font-family:var(--serif);font-weight:600;line-height:1.3;margin:22px 0 12px}
  .md h1{font-size:25px} .md h2{font-size:21px} .md h3{font-size:18px} .md h4{font-size:16px}
  .md ul,.md ol{margin:0 0 14px;padding-left:24px}
  .md li{margin:4px 0}
  .md a{color:var(--accent);text-decoration:none}
  .md a:hover{text-decoration:underline}
  .md strong{font-weight:650}
  .md blockquote{border-left:3px solid var(--border);margin:0 0 14px;padding:2px 0 2px 16px;color:var(--text-2)}
  .md hr{border:0;border-top:1px solid var(--border);margin:20px 0}
  .md code{font-family:var(--mono);font-size:.86em;background:var(--code-bg);padding:2px 5px;border-radius:5px}
  .md pre.md-code{
    background:var(--code-bg);border:1px solid var(--border-soft);border-radius:10px;
    padding:14px 16px;overflow:auto;margin:0 0 14px;
  }
  .md pre.md-code code{background:transparent;padding:0;font-size:13px;line-height:1.6;color:var(--text)}
  .md .md-tablewrap{overflow-x:auto;margin:0 0 14px}
  .md table.md-table{border-collapse:collapse;font-family:var(--sans);font-size:14px;width:100%}
  .md table.md-table th,.md table.md-table td{border:1px solid var(--border);padding:7px 11px;text-align:left;vertical-align:top}
  .md table.md-table th{background:var(--bg-elev);font-weight:600}

  /* ---------- 思考过程(仿 Claude:折叠 + 缩进 prose) ---------- */
  details.think{margin:2px 0 16px}
  details.think>summary{
    list-style:none;cursor:pointer;user-select:none;
    display:inline-flex;align-items:center;gap:7px;
    font-family:var(--sans);font-size:13px;color:var(--text-3);padding:3px 2px;border-radius:7px;
  }
  details.think>summary::-webkit-details-marker{display:none}
  details.think>summary:hover{color:var(--text-2)}
  details.think>summary .spark{width:14px;height:14px;flex:none;color:var(--accent);opacity:.9}
  details.think>summary .chev{
    width:7px;height:7px;border-right:1.6px solid currentColor;border-bottom:1.6px solid currentColor;
    transform:rotate(-45deg);transition:transform .16s;flex:none;margin-left:1px;
  }
  details.think[open]>summary .chev{transform:rotate(45deg)}
  .think-body{
    margin:9px 0 0;padding:1px 0 1px 18px;border-left:2px solid var(--border);
    font-family:var(--serif);font-size:14.5px;line-height:1.72;color:var(--text-2);
  }
  .think-body>*:first-child{margin-top:0}
  .think-body>*:last-child{margin-bottom:0}
  .think-body p{margin:0 0 11px}
  .think-body code{font-family:var(--mono);font-size:.85em;background:var(--code-bg);padding:1px 5px;border-radius:5px}
  .think-body pre.md-code{background:var(--code-bg);border:1px solid var(--border-soft);border-radius:9px;padding:11px 13px;overflow:auto;margin:0 0 11px}
  .think-body pre.md-code code{background:transparent;padding:0;font-size:12.5px}

  /* ---------- 工具调用 / 结果(仿 Claude 卡片) ---------- */
  details.toolcard{
    border:1px solid var(--border-soft);border-radius:12px;background:var(--detail-bg);
    margin:0 0 14px;overflow:hidden;
  }
  details.toolcard>summary{
    list-style:none;cursor:pointer;user-select:none;
    display:flex;align-items:center;gap:11px;padding:10px 13px;
    font-family:var(--sans);font-size:13.5px;
  }
  details.toolcard>summary::-webkit-details-marker{display:none}
  details.toolcard>summary:hover{background:var(--hover)}
  .tool-ic{width:27px;height:27px;flex:none;border-radius:8px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
  .tool-ic svg{width:15px;height:15px}
  .tool-meta{flex:1;min-width:0}
  .tool-name{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:12.5px}
  .tool-kind{font-size:11.5px;color:var(--text-3);margin-top:2px}
  .tool-chev{width:8px;height:8px;border-right:2px solid var(--text-3);border-bottom:2px solid var(--text-3);transform:rotate(-45deg);transition:transform .16s;flex:none}
  details.toolcard[open]>summary .tool-chev{transform:rotate(45deg)}
  details.toolcard.err .tool-ic{background:rgba(212,77,77,.14);color:#e08a8a}
  .tool-body{border-top:1px solid var(--border-soft);padding:12px 14px}
  .tool-body .lbl{font-family:var(--sans);font-size:11px;letter-spacing:.4px;color:var(--text-3);margin:0 0 7px;font-weight:600;text-transform:uppercase}
  .tool-body .lbl.gap{margin-top:14px}
  .tool-pre{
    font-family:var(--mono);font-size:12.5px;line-height:1.6;color:var(--text);
    white-space:pre-wrap;word-break:break-word;background:var(--code-bg);
    border-radius:8px;padding:11px 12px;max-height:340px;overflow:auto;
  }
  .tool-prose{font-family:var(--serif);font-size:14.5px;line-height:1.66;color:var(--text);max-height:380px;overflow:auto}
  .tool-prose>*:first-child{margin-top:0}.tool-prose>*:last-child{margin-bottom:0}
  .tool-prose p{margin:0 0 9px}
  .tool-prose code{font-family:var(--mono);font-size:.85em;background:var(--code-bg);padding:1px 5px;border-radius:5px}
  .tool-prose pre.md-code{background:var(--code-bg);border:1px solid var(--border-soft);border-radius:9px;padding:11px 13px;overflow:auto;margin:0 0 9px}

  /* ---------- 思考过程链(仿 Claude:思考正文 + 内嵌工具节点) ---------- */
  .process{margin:4px 0 18px}
  .process>summary{
    list-style:none;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:8px;
    padding:5px 2px;font-family:var(--sans);font-size:13.5px;color:var(--text-3);border-radius:8px;
  }
  .process>summary::-webkit-details-marker{display:none}
  .process>summary:hover{color:var(--text-2)}
  .process>summary .spark{width:15px;height:15px;flex:none;color:var(--accent);opacity:.92}
  .process>summary .ptitle{color:var(--text-2);font-weight:550}
  .process>summary .pcount{font-size:11.5px;color:var(--text-faint);font-family:var(--mono)}
  .process>summary .chev{width:8px;height:8px;border-right:1.7px solid currentColor;border-bottom:1.7px solid currentColor;transform:rotate(-45deg);transition:transform .18s;flex:none;margin-left:1px}
  .process[open]>summary .chev{transform:rotate(45deg)}
  /* 展开后整条链有一根贯穿左竖线(像 Claude 思考缩进) */
  .steps{margin:9px 0 0;padding:2px 0 2px 0;border-left:2px solid var(--border);}
  .step{position:relative;padding:0 0 0 24px;margin-left:14px}
  .step>summary{
    list-style:none;cursor:pointer;user-select:none;display:flex;align-items:center;gap:9px;
    padding:7px 0;font-family:var(--sans);font-size:13px;color:var(--text-2);position:relative;
  }
  .step>summary::-webkit-details-marker{display:none}
  .step>summary:hover{color:var(--text)}
  .step>summary .node{
    position:absolute;left:-23px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;border-radius:50%;background:var(--bg);
    border:2px solid var(--border);display:grid;place-items:center;color:var(--text-3);
  }
  .step>summary .node svg{width:8px;height:8px}
  .step.s-think>summary .node{border-color:var(--accent);color:var(--accent)}
  .step.s-tool>summary .node{border-color:var(--accent);color:var(--accent)}
  .step.s-err>summary .node{border-color:#d4574d;color:#e08a8a}
  .step[open]>summary .node{background:var(--accent);color:#fff;border-color:var(--accent)}
  .step.s-err[open]>summary .node{background:#d4574d;color:#fff;border-color:#d4574d}
  .step>summary .slabel{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .step>summary .slabel b{font-weight:600;color:var(--text);font-family:var(--mono);font-size:12px}
  .step>summary .stag{font-size:10.5px;color:var(--text-faint);flex:none;margin-left:6px}
  .step>summary .schev{width:7px;height:7px;border-right:1.6px solid var(--text-3);border-bottom:1.6px solid var(--text-3);transform:rotate(-45deg);transition:transform .16s;flex:none}
  .step[open]>summary .schev{transform:rotate(45deg)}
  .step-body{padding:0 0 12px}
  .step-body .lbl{font-family:var(--sans);font-size:11px;letter-spacing:.4px;color:var(--text-3);margin:6px 0 6px;font-weight:600;text-transform:uppercase}
  .step-body .lbl.gap{margin-top:13px}
  .step-think{font-family:var(--serif);font-size:14.5px;line-height:1.72;color:var(--text-2)}
  .step-think>*:first-child{margin-top:0}.step-think>*:last-child{margin-bottom:0}
  .step-think p{margin:0 0 10px}
  .step-think code{font-family:var(--mono);font-size:.85em;background:var(--code-bg);padding:1px 5px;border-radius:5px}
  .step-think pre.md-code{background:var(--code-bg);border:1px solid var(--border-soft);border-radius:9px;padding:11px 13px;overflow:auto;margin:0 0 10px}
  /* 思考的逐阶段摘要(展开时显示在正文上方,像 Claude 的小标题序列) */
  .think-tags{margin:0 0 12px;padding:9px 12px;background:var(--code-bg);border-radius:9px}
  .think-tag{display:flex;align-items:flex-start;gap:8px;font-family:var(--sans);font-size:12.5px;color:var(--text-2);padding:2px 0}
  .think-tag .dot{flex:none;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px}

  /* ---------- 状态徽标:打断 / 工具上限 ---------- */
  .statusbar{display:flex;align-items:center;gap:8px;margin:2px 0 14px;
    font-family:var(--sans);font-size:12.5px;padding:8px 12px;border-radius:9px;border:1px solid var(--border-soft)}
  .statusbar svg{width:15px;height:15px;flex:none}
  .statusbar.cancel{background:rgba(180,150,80,.10);border-color:rgba(190,160,90,.32);color:var(--warn)}
  .statusbar.limit{background:rgba(217,122,87,.10);border-color:rgba(217,122,87,.32);color:var(--accent)}

  /* ---------- 分支切换器(左右叶子) ---------- */
  .branchbar{display:flex;align-items:center;gap:6px;margin:0 0 8px;justify-content:flex-end}
  .msg.human .branchbar{justify-content:flex-end}
  .msg.assistant .branchbar{justify-content:flex-start}
  .branchbar .bb{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:8px;
    background:var(--bg-elev);border:1px solid var(--border-soft);color:var(--text-3);font-family:var(--sans);font-size:11.5px}
  .branchbar .barrow{width:22px;height:22px;display:grid;place-items:center;border-radius:6px;cursor:pointer;color:var(--text-2);border:0;background:transparent}
  .branchbar .barrow:hover{background:var(--hover);color:var(--text)}
  .branchbar .barrow:disabled{opacity:.3;cursor:default}
  .branchbar .barrow svg{width:13px;height:13px}
  .branchbar .bcount{font-family:var(--mono);font-size:11px;color:var(--text-2);min-width:30px;text-align:center}

  /* ---------- 动画与交互打磨 ---------- */
  @keyframes ccaFade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  @keyframes ccaMsg{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes ccaPulse{0%,100%{opacity:.55}50%{opacity:1}}
  details.think[open] .think-body,
  details.toolcard[open] .tool-body,
  details.process[open] .steps,
  details.step[open] .step-body{ animation:ccaFade .22s ease; }
  .msg{ animation:ccaMsg .26s ease both; }
  .process>summary .spark,.think>summary .spark{ transition:opacity .2s }
  details.process:not([open])>summary:hover .spark,
  details.think:not([open])>summary:hover .spark{ animation:ccaPulse 1.4s ease-in-out infinite }
  .step>summary .node{ transition:background .18s,border-color .18s,color .18s,transform .12s }
  .step>summary:hover .node{ transform:translateY(-50%) scale(1.12) }
  details.toolcard,details.process,details.think>summary,.chip,.conv-item{ transition:background .14s,border-color .14s,box-shadow .14s }
  a.chip:hover{ box-shadow:0 1px 0 rgba(0,0,0,.04) }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
    details.think[open] .think-body,details.toolcard[open] .tool-body,
    details.process[open] .steps,details.step[open] .step-body,.msg{animation:none !important}
  }

  /* ---------- 附件 / 文件 ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:9px;
    background:var(--bg-elev);border:1px solid var(--border-soft);color:var(--text-2);
    font-family:var(--sans);font-size:12.5px;text-decoration:none;max-width:300px;
  }
  .chip .cname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .chip .cdl{flex:none;width:15px;height:15px;color:var(--text-3)}
  .chip .cfile{flex:none;width:16px;height:16px;color:var(--accent)}
  a.chip{cursor:pointer}
  a.chip:hover{color:var(--text);border-color:var(--border)}
  a.chip:hover .cdl{color:var(--accent)}
  .chip.chip-img{flex-direction:column;align-items:stretch;max-width:264px;padding:7px}
  .chip.chip-img img{max-width:100%;max-height:230px;border-radius:7px;display:block;object-fit:contain}
  .chip.chip-img .cap{display:flex;align-items:center;gap:6px;margin-top:7px;color:var(--text-3)}

  /* ---------- 空状态 ---------- */
  .empty{
    height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;color:var(--text-3);text-align:center;padding:40px;
  }
  .empty .logo{font-family:var(--serif);font-size:44px;color:var(--text-2);font-weight:500}
  .empty p{font-size:14px;line-height:1.8;max-width:420px}
  .empty .cta{
    display:inline-flex;align-items:center;gap:9px;padding:11px 20px;border-radius:10px;
    background:var(--accent);color:#fff;border:0;cursor:pointer;font-family:var(--sans);
    font-size:14px;font-weight:600;
  }
  .empty .cta:hover{filter:brightness(1.06)}

<script>
'use strict';
const $ = (s,r=document)=>r.querySelector(s);
const ce = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

const state = { convs:[], byId:new Map(), folders:new Map(), activeId:null, query:'' };

/* ---------- 主题 ---------- */
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  try{ localStorage.setItem('cca_theme', t); }catch{}
}
applyTheme((()=>{ try{ return localStorage.getItem('cca_theme')||'dark'; }catch{ return 'dark'; } })());

/* ---------- Markdown(紧凑实现:标题/列表/引用/表格/代码/行内) ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function inlineMd(t){
  t = esc(t);
  t = t.replace(/`([^`]+)`/g,(m,c)=>'<code>'+c+'</code>');
  t = t.replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/(^|[^*\w])\*([^*\n]+?)\*(?=[^*\w]|$)/g,'$1<em>$2</em>');
  t = t.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}
function splitRow(s){ return s.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(x=>x.trim()); }
function mdToHtml(src){
  src = String(src==null?'':src);
  const code=[];
  const stash = (c)=>{ const i=code.length; code.push('<pre class="md-code"><code>'+esc(c.replace(/\s+$/,''))+'</code></pre>'); return '\uE000'+i+'\uE000'; };
  src = src.replace(/```[^\n`]*\n([\s\S]*?)```/g,(m,c)=>stash(c));
  src = src.replace(/~~~[^\n]*\n([\s\S]*?)~~~/g,(m,c)=>stash(c));
  const lines = src.split('\n');
  const out=[]; let i=0;
  const blank = s=>/^\s*$/.test(s);
  const isBlockStart = s=>/^\s*(#{1,6}\s|>\s?|[-*+]\s|\d+[.)]\s)/.test(s) || /^\uE000\d+\uE000\s*$/.test(s) || /^\s*([-*_])\1\1+\s*$/.test(s);
  while(i<lines.length){
    const line = lines[i];
    let m;
    if((m=line.match(/^\uE000(\d+)\uE000\s*$/))){ out.push(code[+m[1]]); i++; continue; }
    if(blank(line)){ i++; continue; }
    if((m=line.match(/^(#{1,6})\s+(.*)$/))){ const n=m[1].length; out.push('<h'+n+'>'+inlineMd(m[2])+'</h'+n+'>'); i++; continue; }
    if(/^\s*([-*_])\1\1+\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
    if(/^\s*>\s?/.test(line)){ const buf=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; } out.push('<blockquote>'+mdToHtml(buf.join('\n'))+'</blockquote>'); continue; }
    if(/\|/.test(line) && i+1<lines.length && /\|/.test(lines[i+1]) && /^\s*\|?[\s:|-]*-[\s:|-]*$/.test(lines[i+1])){
      const header=splitRow(line); i+=2;
      const rows=[]; while(i<lines.length && /\|/.test(lines[i]) && !blank(lines[i])){ rows.push(splitRow(lines[i])); i++; }
      const th='<tr>'+header.map(c=>'<th>'+inlineMd(c)+'</th>').join('')+'</tr>';
      const tb=rows.map(r=>'<tr>'+r.map(c=>'<td>'+inlineMd(c)+'</td>').join('')+'</tr>').join('');
      out.push('<div class="md-tablewrap"><table class="md-table"><thead>'+th+'</thead><tbody>'+tb+'</tbody></table></div>');
      continue;
    }
    if(/^\s*[-*+]\s+/.test(line)){ const it=[]; while(i<lines.length && /^\s*[-*+]\s+/.test(lines[i])){ it.push(lines[i].replace(/^\s*[-*+]\s+/,'')); i++; } out.push('<ul>'+it.map(x=>'<li>'+inlineMd(x)+'</li>').join('')+'</ul>'); continue; }
    if(/^\s*\d+[.)]\s+/.test(line)){ const it=[]; while(i<lines.length && /^\s*\d+[.)]\s+/.test(lines[i])){ it.push(lines[i].replace(/^\s*\d+[.)]\s+/,'')); i++; } out.push('<ol>'+it.map(x=>'<li>'+inlineMd(x)+'</li>').join('')+'</ol>'); continue; }
    const para=[line]; i++;
    while(i<lines.length && !blank(lines[i]) && !isBlockStart(lines[i])){ para.push(lines[i]); i++; }
    out.push('<p>'+para.map(inlineMd).join('<br>')+'</p>');
  }
  return out.join('\n').replace(/\uE000(\d+)\uE000/g,(m,n)=>code[+n]||'');
}

/* ---------- 活动分支(沿 current_leaf_message_uuid 回溯) ---------- */
function activePath(data, leafOverride){
  const msgs = Array.isArray(data&&data.chat_messages)?data.chat_messages:[];
  const by = new Map(msgs.map(m=>[m.uuid,m]));
  let leaf = leafOverride && by.has(leafOverride) ? leafOverride : (data && data.current_leaf_message_uuid);
  if(leaf && by.has(leaf)){
    // current_leaf 有时不是最深(后续消息未更新指针);沿"最新的子"继续下钻到真正叶子
    const kids=new Map();
    for(const m of msgs){ const p=m.parent_message_uuid||'__root__'; if(!kids.has(p))kids.set(p,[]); kids.get(p).push(m); }
    for(const arr of kids.values()) arr.sort((a,b)=>((a.index||0)-(b.index||0))||String(a.created_at||'').localeCompare(String(b.created_at||'')));
    const dseen=new Set();
    while(!dseen.has(leaf)){
      dseen.add(leaf);
      const ch=kids.get(leaf);
      if(!ch||!ch.length) break;
      leaf=ch[ch.length-1].uuid; // 最新的子
    }
    const path=[]; const seen=new Set(); let cur=by.get(leaf);
    while(cur && !seen.has(cur.uuid)){ seen.add(cur.uuid); path.push(cur); cur=by.get(cur.parent_message_uuid); }
    path.reverse(); if(path.length) return path;
  }
  return msgs.slice().sort((a,b)=>((a.index||0)-(b.index||0))||String(a.created_at||'').localeCompare(String(b.created_at||'')));
}

/* ---------- 渲染:思考 / 工具(仿 Claude) ---------- */
function preBlock(text){ const p=ce('pre','tool-pre'); p.textContent=String(text==null?'':text); return p; }
function toolResultText(b){
  const c=b&&b.content;
  if(typeof c==='string') return c;
  if(Array.isArray(c)) return c.map(x=>(x&&x.type==='text'&&typeof x.text==='string')?x.text:JSON.stringify(x,null,2)).join('\n');
  return JSON.stringify(c==null?b:c,null,2);
}
function sparkSvg(){ return '<svg class="spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4" stroke-linecap="round"/></svg>'; }
function toolIconSvg(name){
  const n=String(name||'').toLowerCase();
  if(/search|web|google|fetch|browse|http/.test(n)) return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>';
  if(/file|create|write|str_replace|edit|view|read|present/.test(n)) return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 3v5h5M7 3h7l5 5v11a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke-linejoin="round"/></svg>';
  if(/bash|command|exec|terminal|run|code|shell|python|node/.test(n)) return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 7l4 5-4 5M12 17h7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  if(/image|photo|art|draw|render|visual|chart|diagram/.test(n)) return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M21 16l-5-5-7 7" stroke-linejoin="round"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2l2.5 5.3 5.8.8-4.2 4.1 1 5.8L12 20.2 6.9 23l1-5.8L3.7 13l5.8-.8z" stroke-linejoin="round"/></svg>';
}
function thinkBlock(text){
  const d=ce('details','think');
  const s=ce('summary'); s.innerHTML=sparkSvg()+'<span>思考过程</span><span class="chev"></span>';
  d.appendChild(s);
  const body=ce('div','think-body'); body.innerHTML=mdToHtml(text||'');
  d.appendChild(body);
  return d;
}
function lbl(text,gap){ return ce('div','lbl'+(gap?' gap':''),esc(text)); }
function proseBox(text){ const d=ce('div','tool-prose'); d.innerHTML=mdToHtml(text||''); return d; }
function looksJson(s){ s=String(s==null?'':s).trim(); if(!(s[0]==='{'||s[0]==='[')) return false; try{ JSON.parse(s); return true; }catch{ return false; } }
function prettyJson(s){ try{ return JSON.stringify(JSON.parse(String(s)), null, 2); }catch{ return String(s==null?'':s); } }
function resultNode(b){
  const txt=toolResultText(b);
  if(looksJson(txt)) return preBlock(prettyJson(txt)); // 重新美化,中文正常显示
  return proseBox(txt);
}
function toolCard(name,kindLabel,bodyNodes,isErr){
  const d=ce('details','toolcard'+(isErr?' err':''));
  const s=ce('summary');
  s.innerHTML='<span class="tool-ic">'+toolIconSvg(name)+'</span>'+
    '<span class="tool-meta"><div class="tool-name">'+esc(name||'tool')+'</div><div class="tool-kind">'+esc(kindLabel)+'</div></span>'+
    '<span class="tool-chev"></span>';
  d.appendChild(s);
  const body=ce('div','tool-body');
  bodyNodes.forEach(n=>body.appendChild(n));
  d.appendChild(body);
  return d;
}
function blockEl(b){
  const t = b && b.type;
  if(t==='text' || (!t && typeof (b&&b.text)==='string')){ const d=ce('div','md'); d.innerHTML=mdToHtml(b.text||''); return d; }
  if(t==='thinking') return thinkBlock(b.thinking||b.text||'');
  if(t==='tool_use'){
    return toolCard(b.name||'工具','调用工具',[ lbl('请求参数'), preBlock(JSON.stringify(b.input||{},null,2)) ],false);
  }
  if(t==='tool_result'){
    return toolCard(b.name||'工具', b.is_error?'工具出错':'工具结果',
      [ lbl(b.is_error?'返回(错误)':'返回结果'), resultNode(b) ], !!b.is_error);
  }
  return toolCard(t||'block','原始数据',[ preBlock(JSON.stringify(b,null,2)) ],false);
}

/* ---------- 过程时间线(仿 Claude:思考标签 + 内嵌工具) ---------- */
function nodeIcon(kind,name){
  if(kind==='think') return sparkSvg();
  return toolIconSvg(name);
}
// 取 thinking 块的摘要(Claude 标签);返回 {tags:[...], text}
function thinkInfo(block){
  const text = (block && (block.thinking || block.text)) || '';
  const tags = (block && Array.isArray(block.summaries))
    ? block.summaries.map(s => s && s.summary).filter(Boolean)
    : [];
  return { tags, text, cutOff: !!(block && block.cut_off) };
}
function stepThink(block){
  const { tags, text } = thinkInfo(block);
  const label = tags.length ? tags[tags.length-1] : '思考';
  const d=ce('details','step s-think');
  const s=ce('summary');
  s.innerHTML='<span class="node">'+sparkSvg()+'</span>'+
    '<span class="slabel">'+esc(label)+'</span>'+
    '<span class="schev"></span>';
  d.appendChild(s);
  const body=ce('div','step-body');
  // 多个阶段摘要:仅当数量适中(2-3 条)时列出;过多是流式滚动标签,正文已足够,不堆叠
  if(tags.length>1 && tags.length<=3){
    const ul=ce('div','think-tags');
    tags.forEach(t=>{ const it=ce('div','think-tag'); it.innerHTML='<span class="dot"></span>'+esc(t); ul.appendChild(it); });
    body.appendChild(ul);
  }
  const tk=ce('div','step-think'); tk.innerHTML=mdToHtml(text||''); body.appendChild(tk);
  d.appendChild(body);
  return d;
}
function stepTool(use, result){
  const name=(use&&use.name)||(result&&result.name)||'工具';
  const isErr=!!(result&&result.is_error);
  const d=ce('details','step s-tool'+(isErr?' s-err':''));
  const s=ce('summary');
  s.innerHTML='<span class="node">'+toolIconSvg(name)+'</span>'+
    '<span class="slabel"><b>'+esc(name)+'</b></span><span class="schev"></span>';
  d.appendChild(s);
  const body=ce('div','step-body');
  if(use){ body.appendChild(lbl('请求参数')); body.appendChild(preBlock(JSON.stringify(use.input||{},null,2))); }
  if(result){
    const isE=!!result.is_error;
    body.appendChild(lbl(isE?'返回(错误)':'返回结果', !!use));
    body.appendChild(resultNode(result));
  }
  d.appendChild(body);
  return d;
}
function processTimeline(steps){
  // steps: [{kind:'think',block} | {kind:'tool',use,result}]
  // 头部标签:用各 thinking 块最后一条 summary 串起来(Claude 的"在做什么"),无则退回计数
  const labels=[];
  for(const st of steps){
    if(st.kind==='think'){
      const { tags } = thinkInfo(st.block);
      if(tags.length) labels.push(tags[tags.length-1]);
    }
  }
  const nTool=steps.filter(s=>s.kind==='tool').length;
  let head;
  if(labels.length){
    // 折叠态显示最后一个阶段标签(最贴近"刚才/正在做什么"),多段时加 +N
    head = esc(labels[labels.length-1]) + (labels.length>1 ? ' <span class="pcount">+'+(labels.length-1)+' 步</span>' : '');
  } else {
    head = '思考' + (nTool ? ' <span class="pcount">· 调用 '+nTool+' 次工具</span>' : '');
  }

  const d=ce('details','process');
  const s=ce('summary');
  s.innerHTML=sparkSvg()+'<span class="ptitle">'+head+'</span><span class="chev"></span>';
  d.appendChild(s);
  const wrap=ce('div','steps');
  steps.forEach(st=>{
    if(st.kind==='think') wrap.appendChild(stepThink(st.block));
    else wrap.appendChild(stepTool(st.use, st.result));
  });
  d.appendChild(wrap);
  return d;
}
// 把一条消息的 content 分组:连续的 thinking/tool 收进时间线,text 作为普通 prose
function renderAssistantContent(content, container){
  let i=0;
  while(i<content.length){
    const b=content[i];
    const t=b&&b.type;
    if(t==='thinking'||t==='tool_use'||t==='tool_result'){
      const steps=[];
      while(i<content.length){
        const c=content[i], ct=c&&c.type;
        if(ct==='thinking'){ steps.push({kind:'think', block:c}); i++; }
        else if(ct==='tool_use'){
          const nxt=content[i+1];
          if(nxt && nxt.type==='tool_result'){ steps.push({kind:'tool',use:c,result:nxt}); i+=2; }
          else { steps.push({kind:'tool',use:c,result:null}); i++; }
        }
        else if(ct==='tool_result'){ steps.push({kind:'tool',use:null,result:c}); i++; }
        else break;
      }
      if(steps.length) container.appendChild(processTimeline(steps));
    } else {
      // text / 其它
      container.appendChild(blockEl(b));
      i++;
    }
  }
}

/* ---------- 资源解析(把 files/ 里的文件映射成可点链接/图片) ---------- */
const _urls=new Map();
function objUrl(f){ if(_urls.has(f))return _urls.get(f); const u=URL.createObjectURL(f); _urls.set(f,u); return u; }
function resolveAsset(conv, filename, uuid){
  if(!conv) return null;
  const e = state.folders.get(conv._folder); if(!e||!e.files) return null;
  const entries=[...e.files]; // [relName, File]
  const base=(n)=>n.split('/').pop();
  // 1) 文件名精确匹配
  if(filename){
    const want=String(filename).toLowerCase();
    for(const [n,f] of entries){ if(base(n).toLowerCase()===want) return objUrl(f); }
  }
  // 2) 按 uuid 短码匹配(去重命名会插入 __{uuid8})
  if(uuid){
    const u8=String(uuid).slice(0,8).toLowerCase();
    for(const [n,f] of entries){ if(base(n).toLowerCase().includes('__'+u8)) return objUrl(f); }
    for(const [n,f] of entries){ if(base(n).toLowerCase().includes(u8)) return objUrl(f); }
  }
  // 3) 同名主干 + 任意后缀(stem__xxx.ext)
  if(filename){
    const fn=String(filename); const dot=fn.lastIndexOf('.');
    const stem=(dot>0?fn.slice(0,dot):fn).toLowerCase();
    const ext=(dot>0?fn.slice(dot):'').toLowerCase();
    for(const [n,f] of entries){
      const b=base(n).toLowerCase();
      if(b===stem+ext) return objUrl(f);
      if(b.startsWith(stem+'__') && (!ext||b.endsWith(ext))) return objUrl(f);
    }
  }
  return null;
}
const DL_ICON='<svg class="cdl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12M7 11l5 4 5-4M5 21h14" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const FILE_ICON='<svg class="cfile" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 3v5h5M7 3h7l5 5v11a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke-linejoin="round"/></svg>';
function blobUrlFor(text,key){
  if(_urls.has(key)) return _urls.get(key);
  const u=URL.createObjectURL(new Blob([String(text==null?'':text)],{type:'text/plain;charset=utf-8'}));
  _urls.set(key,u); return u;
}
function makeChip(obj, conv){
  const name = obj.file_name || obj.file_uuid || '文件';
  const uuid = obj.file_uuid || obj.uuid || null;
  const url = resolveAsset(conv, obj.file_name, uuid);
  // 图片:内嵌预览 + 点击可下载
  if(url && /\.(png|jpe?g|gif|webp|svg|bmp)$/i.test(name)){
    const a=ce('a','chip chip-img'); a.href=url; a.download=name;
    const img=ce('img'); img.src=url; img.alt=name; a.appendChild(img);
    const cap=ce('div','cap'); cap.innerHTML=FILE_ICON+'<span class="cname">'+esc(name)+'</span>'+DL_ICON;
    a.appendChild(cap);
    return a;
  }
  // 有实际文件:可查看的(pdf/html/txt/json/csv/md)新标签打开,其余触发下载
  if(url){
    const viewable=/\.(pdf|html?|txt|json|csv|md|svg)$/i.test(name);
    const a=ce('a','chip'); a.href=url;
    if(viewable){ a.target='_blank'; a.rel='noopener'; } else { a.download=name; }
    a.title = viewable ? '点击在新标签打开 · 右键可下载' : '点击下载';
    a.innerHTML=FILE_ICON+'<span class="cname">'+esc(name)+'</span>'+DL_ICON;
    return a;
  }
  // 无文件但有提取文本(上传的文档):生成可下载 .txt
  const text = (typeof obj.extracted_content==='string' && obj.extracted_content) ? obj.extracted_content
             : (obj.file_kind==='text' && typeof obj.content==='string' ? obj.content : null);
  if(text){
    const dn=(String(name).replace(/\.[^.]+$/,'')||name)+'.txt';
    const a=ce('a','chip'); a.href=blobUrlFor(text, conv._folder+'|'+name); a.download=dn;
    a.innerHTML=FILE_ICON+'<span class="cname">'+esc(name)+'</span>'+DL_ICON;
    return a;
  }
  // 啥都没有:纯标签
  const span=ce('span','chip'); span.innerHTML=FILE_ICON+'<span class="cname">'+esc(name)+'</span>';
  return span;
}

/* ---------- 状态徽标(打断 / 工具上限) ---------- */
function statusBadge(stopReason){
  if(stopReason==='user_canceled'){
    const d=ce('div','statusbar cancel');
    d.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6" stroke-linecap="round"/></svg><span>此回复被你打断,未生成完整</span>';
    return d;
  }
  if(stopReason==='tool_use_limit' || stopReason==='max_tokens'){
    const d=ce('div','statusbar limit');
    const txt = stopReason==='max_tokens' ? '已达到本次回复长度上限' : '已达到工具调用次数上限,回复在此暂停';
    d.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 8v5M12 16h.01M10.3 3.9 2.4 18a1.8 1.8 0 0 0 1.6 2.7h16a1.8 1.8 0 0 0 1.6-2.7L13.7 3.9a1.8 1.8 0 0 0-3.1 0z" stroke-linejoin="round"/></svg><span>'+txt+'</span>';
    return d;
  }
  return null;
}

/* ---------- 分支(同一父节点下的多个兄弟)---------- */
// 合并多份同一对话的 JSON:按 uuid 去重(取信息更全者),保留全部分支,leaf 用最新版
function mergeConversations(datas){
  if(datas.length===1) return datas[0];
  const sorted=datas.slice().sort((x,y)=>String(y.updated_at||'').localeCompare(String(x.updated_at||'')));
  const newest=sorted[0];
  const score=(m)=>{
    let s=(Array.isArray(m.content)?m.content.length:0)*10;
    s+=JSON.stringify(m).length/1000;
    if(m.stop_reason && m.stop_reason!=='user_canceled') s+=5; // 完成的优于被打断的
    return s;
  };
  const byUuid=new Map();
  for(const d of sorted){
    for(const m of (d.chat_messages||[])){
      const prev=byUuid.get(m.uuid);
      if(!prev || score(m)>score(prev)) byUuid.set(m.uuid, m);
    }
  }
  return {
    ...newest,
    chat_messages:[...byUuid.values()],
    current_leaf_message_uuid:newest.current_leaf_message_uuid,
    _archive:{...(newest._archive||{}), merged_from:datas.length}
  };
}
function buildChildMap(data){
  const msgs=Array.isArray(data&&data.chat_messages)?data.chat_messages:[];
  const kids=new Map();
  for(const m of msgs){
    const p=m.parent_message_uuid||'__root__';
    if(!kids.has(p)) kids.set(p,[]);
    kids.get(p).push(m);
  }
  for(const arr of kids.values()){
    arr.sort((a,b)=>((a.index||0)-(b.index||0))||String(a.created_at||'').localeCompare(String(b.created_at||'')));
  }
  return kids;
}
// 取某节点子树里"最新"的叶子(沿 created_at 最大的子一路向下),用于切换分支后定位 leaf
function deepestLeaf(data, startUuid){
  const kids=buildChildMap(data);
  let cur=startUuid;
  for(;;){
    const ch=kids.get(cur);
    if(!ch||!ch.length) return cur;
    cur=ch[ch.length-1].uuid; // 最新的子
  }
}
function branchSwitcher(sibs, curUuid, conv){
  if(!sibs || sibs.length<2) return null;
  const idx=sibs.findIndex(s=>s.uuid===curUuid);
  const bar=ce('div','branchbar');
  const wrap=ce('div','bb');
  const prev=ce('button','barrow'); prev.title='上一个分支';
  prev.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const next=ce('button','barrow'); next.title='下一个分支';
  next.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const cnt=ce('span','bcount', (idx+1)+' / '+sibs.length);
  if(idx<=0) prev.disabled=true;
  if(idx>=sibs.length-1) next.disabled=true;
  const go=(targetUuid)=>{ conv._leaf = deepestLeaf(conv.data, targetUuid); renderThread(); };
  prev.addEventListener('click',(e)=>{ e.stopPropagation(); if(idx>0) go(sibs[idx-1].uuid); });
  next.addEventListener('click',(e)=>{ e.stopPropagation(); if(idx<sibs.length-1) go(sibs[idx+1].uuid); });
  wrap.appendChild(prev); wrap.appendChild(cnt); wrap.appendChild(next);
  bar.appendChild(wrap);
  return bar;
}

/* ---------- 渲染:单条消息 ---------- */
function messageEl(m, conv, sibs){
  const row=ce('div','msg '+(m.sender==='human'?'human':'assistant'));
  const inner=ce('div','msg-inner');

  // 分支切换器(该消息在父节点下有多个兄弟时)
  const bs=branchSwitcher(sibs, m.uuid, conv);
  if(bs) inner.appendChild(bs);

  const atts=Array.isArray(m.attachments)?m.attachments:[];
  const files=[].concat(Array.isArray(m.files)?m.files:[], Array.isArray(m.files_v2)?m.files_v2:[]);

  // 用户上传的附件 → 放消息顶部(它们是输入)
  if(atts.length){
    const c=ce('div','chips'); atts.forEach(a=>c.appendChild(makeChip(a,conv))); inner.appendChild(c);
  }

  const content=(Array.isArray(m.content)&&m.content.length)?m.content:(m.text?[{type:'text',text:m.text}]:[]);
  if(m.sender==='human'){
    content.forEach(b=>inner.appendChild(blockEl(b)));
  } else {
    renderAssistantContent(content, inner);
  }

  // 生成 / 关联的文件 → 放消息末尾(它们是产出)
  if(files.length){
    const c=ce('div','chips'); c.style.marginTop='6px'; files.forEach(f=>c.appendChild(makeChip(f,conv))); inner.appendChild(c);
  }

  // 状态徽标:打断 / 工具上限(放消息末尾)
  const badge=statusBadge(m.stop_reason);
  if(badge) inner.appendChild(badge);

  row.appendChild(inner);
  return row;
}

/* ---------- 渲染:对话线程 ---------- */
function renderThread(){
  const conv=state.byId.get(state.activeId);
  const thread=$('#thread'); thread.innerHTML='';
  if(!conv){ thread.appendChild(emptyState()); $('#topTitle').textContent=''; $('#topModel').textContent=''; return; }
  $('#topTitle').textContent=conv.name||'未命名对话';
  $('#topModel').textContent=conv.model||'';
  // 合并来源提示
  const mb=$('#topMerged');
  if(mb){
    if(conv._mergedFrom>1){ mb.style.display=''; mb.textContent='已合并 '+conv._mergedFrom+' 版·去重'; }
    else mb.style.display='none';
  }
  const wrap=ce('div','thread-inner');
  const kids=buildChildMap(conv.data);
  const path=activePath(conv.data, conv._leaf);
  for(const m of path){
    const sibs=kids.get(m.parent_message_uuid||'__root__')||[];
    wrap.appendChild(messageEl(m, conv, sibs));
  }
  thread.appendChild(wrap);
  thread.scrollTop=0;
}

/* ---------- 渲染:侧栏(按日期分组) ---------- */
function bucket(ts){
  const d=new Date(ts); if(isNaN(d)) return '未知日期';
  const now=new Date();
  const sod=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=Math.round((sod-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);
  if(diff<=0) return '今天';
  if(diff===1) return '昨天';
  if(diff<7) return '过去 7 天';
  if(diff<30) return '过去 30 天';
  return d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月';
}
function renderSidebar(){
  const list=$('#convList'); list.innerHTML='';
  let convs=state.convs.slice();
  const q=state.query.trim().toLowerCase();
  if(q) convs=convs.filter(c=>(c.name||'').toLowerCase().includes(q));
  convs.sort((a,b)=>String(b.updated_at||'').localeCompare(String(a.updated_at||'')));
  if(!convs.length){ list.appendChild(ce('div','side-empty',state.convs.length?'没有匹配的对话':'点上方「选择存档文件夹」<br>载入你的 ClaudeArchive')); $('#count').textContent=state.convs.length?(state.convs.length+' 个对话'):'尚未载入'; return; }
  const groups=new Map();
  for(const c of convs){ const k=bucket(c.updated_at); if(!groups.has(k))groups.set(k,[]); groups.get(k).push(c); }
  for(const [k,items] of groups){
    const g=ce('div','side-group'); g.appendChild(ce('div','side-group-t',esc(k)));
    items.forEach(c=>{
      const it=ce('button','conv-item'+(c.uuid===state.activeId?' active':''),'<span class="conv-name">'+esc(c.name||'未命名对话')+'</span>');
      it.addEventListener('click',()=>{ state.activeId=c.uuid; renderSidebar(); renderThread(); });
      g.appendChild(it);
    });
    list.appendChild(g);
  }
  $('#count').textContent=state.convs.length+' 个对话';
}

/* ---------- 空状态 ---------- */
function emptyState(){
  const e=ce('div','empty');
  e.innerHTML='<div class="logo">Claude</div>'+
    '<p>选择你的 <code>ClaudeArchive</code> 文件夹,在这里以 Claude 网页版的样子浏览全部对话 —— 含思考过程、工具调用与文件。<br>所有数据只在本机加载,不上传任何地方。</p>';
  const btn=ce('button','cta','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke-linejoin="round"/></svg>选择存档文件夹');
  btn.addEventListener('click',()=>$('#folderInput').click());
  e.appendChild(btn);
  return e;
}

/* ---------- 载入文件夹 ---------- */
async function handleFiles(fileList){
  const files=[...fileList];
  if(!files.length) return;

  // 1) 收集所有可能是"对话 JSON"的文件(conversation*.json 或任意 .json),以及各文件夹的 files/
  const jsonFiles=[]; // {file, folder}
  const folderFiles=new Map(); // folder -> Map(relName->File)
  for(const f of files){
    const rel=f.webkitRelativePath||f.name;
    const parts=rel.split('/');
    const base=parts[parts.length-1];
    const folder=parts.slice(0,-1).join('/');
    if(/\.json$/i.test(base) && base!=='_index.json'){
      jsonFiles.push({file:f, folder});
    }
    // files/ 子目录
    const fi=rel.indexOf('/files/');
    if(fi>=0){
      const fdr=rel.slice(0,fi);
      if(!folderFiles.has(fdr)) folderFiles.set(fdr,new Map());
      folderFiles.get(fdr).set(rel.slice(fi+7), f);
    }
  }

  // 2) 解析 JSON,按对话 uuid 分组(同一对话的多版本会聚到一起)
  const groups=new Map(); // uuid -> { datas:[], folders:Set }
  for(const {file, folder} of jsonFiles){
    let data; try{ data=JSON.parse(await file.text()); }catch{ continue; }
    if(!Array.isArray(data.chat_messages)) continue; // 不是对话 JSON,跳过
    const uuid=data.uuid||folder||file.name;
    if(!groups.has(uuid)) groups.set(uuid,{datas:[],folders:new Set()});
    groups.get(uuid).datas.push(data);
    if(folder) groups.get(uuid).folders.add(folder);
  }

  // 3) 每组合并去重;合并其涉及文件夹的 files/
  const convs=[]; const byId=new Map(); const foldersOut=new Map();
  let mergedCount=0;
  for(const [uuid,g] of groups){
    const data = g.datas.length>1 ? (mergedCount++, mergeConversations(g.datas)) : g.datas[0];
    // 合并这些文件夹的 files/(按文件名,后者不覆盖已存在)
    const fileMap=new Map();
    for(const fdr of g.folders){
      const fm=folderFiles.get(fdr);
      if(fm) for(const [n,fl] of fm){ if(!fileMap.has(n)) fileMap.set(n,fl); }
    }
    const key='__'+uuid+'__';
    foldersOut.set(key,{json:null,files:fileMap});
    const conv={ uuid, name:data.name||'未命名对话', updated_at:data.updated_at||data.created_at||'',
                 created_at:data.created_at||'', model:data.model||'', data, _folder:key,
                 _mergedFrom: g.datas.length>1 ? g.datas.length : 0 };
    convs.push(conv); byId.set(uuid, conv);
  }

  state.convs=convs; state.byId=byId; state.folders=foldersOut;
  if(convs.length){
    state.activeId=convs.slice().sort((a,b)=>String(b.updated_at||'').localeCompare(String(a.updated_at||'')))[0].uuid;
  } else { state.activeId=null; }
  renderSidebar(); renderThread();
  if(!convs.length) toast('未找到对话 JSON(需含 chat_messages)');
  else if(mergedCount) toast('已载入 '+convs.length+' 个对话('+mergedCount+' 个由多版本合并去重)');
  else toast('已载入 '+convs.length+' 个对话');
}

/* ---------- toast ---------- */
let _tt;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ---------- 事件 ---------- */
$('#themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
$('#loadBtn').addEventListener('click',()=>$('#folderInput').click());
$('#loadJsonBtn').addEventListener('click',()=>$('#jsonInput').click());
$('#reloadBtn').addEventListener('click',()=>$('#folderInput').click());
$('#folderInput').addEventListener('change',e=>handleFiles(e.target.files));
$('#jsonInput').addEventListener('change',e=>handleFiles(e.target.files));
$('#searchInput').addEventListener('input',e=>{ state.query=e.target.value; renderSidebar(); });

renderThread();
